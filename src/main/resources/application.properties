# =====================================================================
# UBT TECHNOLOGY - application.properties (FINAL FIXED)
# =====================================================================

server.servlet.context-path=/api

# ================= DATABASE (handled by Railway Variables) =================
# Do NOT define spring.datasource.url/username/password here

spring.datasource.hikari.initialization-fail-timeout=0

# ================= HikariCP =================
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.pool-name=UBT-HikariPool

# ================= JPA / Hibernate =================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.open-in-view=false

# ================= Encoding =================
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4

# ================= File Upload =================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ================= JWT =================
app.jwt.secret=UBTTechnologyIncubationSecretKey2025NagpurMaharashtraSecure
app.jwt.expiration=86400000
app.admin.password=ubtech@admin2025

# ================= CORS =================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:4173,https://ubt-technology.vercel.app,https://www.ubtorg.com

# ================= Email =================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.to=info@ubtorg.com

# ================= Logging =================
logging.level.com.ubt=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{20} - %msg%n

# ================= Actuator =================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always